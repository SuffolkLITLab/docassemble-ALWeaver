<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Editor &mdash; Docassemble</title>
<script defer src="/static/fontawesome/js/all.min.js"></script>
<link rel="stylesheet" href="/static/bootstrap/css/bootstrap.min.css">
<link rel="stylesheet" href="/al/editor/static/styles.css">
<link rel="stylesheet" href="/al/editor/static/editor.css">
</head>
<body>
<div id="editor-app">

  <!-- ===== TOP BAR ===== -->
  <header class="editor-topbar" id="topbar">
    <div class="editor-topbar-inner">
      <div class="editor-brand">
        <img class="editor-brand-logo" src="/al/editor/static/logo.svg" alt="ALWeaver">
        <span class="editor-brand-project" id="topbar-project-name">No project selected</span>
      </div>
      <nav class="editor-top-tabs" id="view-tabs">
        <button type="button" class="editor-top-tab btn btn-sm btn-light active" data-view="interview">Interview</button>
        <button type="button" class="editor-top-tab btn btn-sm btn-outline-light" data-view="templates">Templates</button>
        <button type="button" class="editor-top-tab btn btn-sm btn-outline-light" data-view="modules">Modules</button>
        <button type="button" class="editor-top-tab btn btn-sm btn-outline-light" data-view="static">Static</button>
        <button type="button" class="editor-top-tab btn btn-sm btn-outline-light" data-view="data">Data Sources</button>
      </nav>
      <div class="editor-top-actions">
        <button type="button" class="btn btn-sm btn-outline-light" id="btn-project-selector">Projects</button>
        <button type="button" class="btn btn-sm btn-outline-light" id="btn-new-project">New project</button>
        <button type="button" class="btn btn-sm btn-outline-light" id="btn-full-yaml">Full YAML</button>
        <button type="button" class="btn btn-sm btn-outline-light" id="btn-order-builder">Order builder</button>
        <button type="button" class="btn btn-sm btn-outline-light" id="btn-standard-playground">Playground</button>
        <button type="button" class="btn btn-sm btn-light" id="btn-preview-interview">Preview</button>
      </div>
    </div>
  </header>

  <!-- ===== MAIN LAYOUT ===== -->
  <div class="editor-layout" id="editor-layout">

    <!-- LEFT RAIL -->
    <aside class="editor-left" id="left-rail">
      <div class="editor-section">
        <label class="editor-tiny" for="project-select">Project</label>
        <select class="form-select form-select-sm mt-1" id="project-select"></select>
      </div>
      <div class="editor-section">
        <label class="editor-tiny" for="file-select">File</label>
        <select class="form-select form-select-sm mt-1" id="file-select"></select>
      </div>
      <div class="editor-section editor-section-search">
        <input class="form-control form-control-sm mb-2" id="search-input"
               placeholder="Search blocks&hellip;">
      </div>
      <div class="editor-section">
        <div class="editor-tiny">Quick jump</div>
        <div class="editor-jump-list" id="jump-targets">
          <button type="button" class="editor-jump-item active" data-jump="questions">Questions</button>
          <button type="button" class="editor-jump-item" data-jump="all">All blocks</button>
          <button type="button" class="editor-jump-item" data-jump="order">Order</button>
          <button type="button" class="editor-jump-item" data-jump="code">Code</button>
          <button type="button" class="editor-jump-item" data-jump="meta">Meta</button>
          <button type="button" class="editor-jump-item" data-jump="attachments">Attachments</button>
          <button type="button" class="editor-jump-item" data-jump="objects">Objects</button>
        </div>
      </div>
      <div class="editor-outline-header">
        <span class="editor-tiny">Outline</span>
      </div>
      <div class="editor-outline-list" id="outline-list"></div>
    </aside>

    <!-- MAIN CANVAS -->
    <main class="editor-main" id="main-canvas">
      <div class="editor-canvas" id="canvas-content">
        <div class="text-center py-5 text-muted">
          <p>Select a project and file to begin editing.</p>
        </div>
      </div>
    </main>

  </div>
</div>

<!-- ===== MODALS ===== -->

<!-- Insert Block Modal -->
<div class="modal fade" id="insert-modal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Insert block</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="d-grid gap-2">
          <button type="button" class="btn btn-primary text-start" data-insert="question">New question screen</button>
          <button type="button" class="btn btn-outline-secondary text-start" data-insert="code">New code block</button>
          <button type="button" class="btn btn-outline-secondary text-start" data-insert="objects">New objects block</button>
          <button type="button" class="btn btn-outline-secondary text-start" data-insert="other">New YAML block</button>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- Order Step Preview Modal -->
<div class="modal fade" id="order-preview-modal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <div class="editor-tiny" id="order-preview-label"></div>
          <h5 class="modal-title mt-1" id="order-preview-summary"></h5>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="order-preview-body"></div>
    </div>
  </div>
</div>

<!-- Order Step Edit Modal -->
<div class="modal fade" id="order-edit-modal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <div class="editor-tiny">Edit order step</div>
          <h5 class="modal-title mt-1" id="order-edit-title"></h5>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="order-edit-body"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-sm btn-primary" id="order-edit-save">Save step</button>
      </div>
    </div>
  </div>
</div>

<!-- Order Step Add Modal -->
<div class="modal fade" id="order-add-modal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <div class="editor-tiny">Add order step</div>
          <h5 class="modal-title mt-1">Choose type and details</h5>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="editor-tiny" for="order-add-kind">Step type</label>
          <select class="form-select form-select-sm mt-1" id="order-add-kind">
            <option value="screen">Screen</option>
            <option value="gather">List gather</option>
            <option value="condition">Condition</option>
            <option value="section">Start section</option>
            <option value="progress">Progress</option>
            <option value="function">Function</option>
            <option value="raw">Raw Python</option>
          </select>
        </div>
        <div id="order-add-body"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-sm btn-primary" id="order-add-save">Add step</button>
      </div>
    </div>
  </div>
</div>

<!-- Symbol Insert Modal (used for Mako insertion and label context menu) -->
<div class="modal fade" id="symbol-insert-modal" tabindex="-1">
  <div class="modal-dialog modal-sm modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <div class="editor-tiny">Insert</div>
          <h5 class="modal-title mt-1" id="symbol-insert-title">Name or Formatting</h5>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="editor-label-quick-actions mb-2">
          <button type="button" class="btn btn-sm btn-outline-secondary" data-label-insert="bold"><i class="fa-solid fa-bold"></i></button>
          <button type="button" class="btn btn-sm btn-outline-secondary" data-label-insert="italic"><i class="fa-solid fa-italic"></i></button>
          <button type="button" class="btn btn-sm btn-outline-secondary" data-label-insert="link"><i class="fa-solid fa-link"></i></button>
          <button type="button" class="btn btn-sm btn-outline-secondary" data-label-insert="mako"><i class="fa-solid fa-code"></i> Mako</button>
        </div>
        <div id="symbol-insert-search-wrap">
          <label class="editor-tiny" for="symbol-insert-search">Search available names</label>
          <input class="form-control form-control-sm mt-1" id="symbol-insert-search" placeholder="Type to filter names">
        </div>
        <div class="editor-tiny mt-2" id="symbol-insert-summary"></div>
        <div id="symbol-insert-list-wrap">
          <div class="editor-symbol-list mt-2" id="symbol-insert-list"></div>
        </div>
        <div id="symbol-insert-form-wrap" class="d-none">
          <div id="symbol-insert-form-body"></div>
        </div>
        <div class="editor-insert-doc-links mt-2">
          <a href="https://docassemble.org/docs/markup.html" target="_blank" rel="noopener noreferrer">Docassemble markup docs</a>
          <a href="https://docs.makotemplates.org/en/latest/syntax.html" target="_blank" rel="noopener noreferrer">Mako syntax docs</a>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-sm btn-primary d-none" id="symbol-insert-apply">Insert</button>
      </div>
    </div>
  </div>
</div>

<script src="/static/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/static/bootstrap-fileinput/js/plugins/sortable.min.js"></script>
<script>
  window.__EDITOR_BOOTSTRAP__ = __EDITOR_BOOTSTRAP_JSON__;
</script>
<script src="/al/editor/static/editor.js"></script>
</body>
</html>
