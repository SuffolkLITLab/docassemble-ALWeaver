<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Editor &mdash; Docassemble</title>
<script defer src="/static/fontawesome/js/all.min.js"></script>
<link rel="stylesheet" href="/static/bootstrap/css/bootstrap.min.css">
<link rel="stylesheet" href="/al/editor/static/styles.css">
<link rel="stylesheet" href="/al/editor/static/editor.css">
</head>
<body>
<div id="editor-app">

  <!-- ===== TOP BAR ===== -->
  <header class="editor-topbar" id="topbar">
    <div class="editor-topbar-inner">
      <div class="editor-brand">
        <img class="editor-brand-logo" src="/packagestatic/docassemble.ALWeaver/logo.svg?v=2.1.0" alt="ALWeaver">
        <span class="editor-brand-project" id="topbar-project-name">No project selected</span>
      </div>
      <nav class="editor-top-tabs d-none d-lg-flex" id="view-tabs">
        <button type="button" class="editor-top-tab btn btn-sm btn-light active" data-view="interview"><i class="fa-solid fa-file-lines me-1" aria-hidden="true"></i>Interview</button>
        <button type="button" class="editor-top-tab btn btn-sm btn-outline-light" data-view="templates"><i class="fa-solid fa-file-word me-1" aria-hidden="true"></i>Templates</button>
        <button type="button" class="editor-top-tab btn btn-sm btn-outline-light" data-view="modules"><i class="fa-solid fa-cube me-1" aria-hidden="true"></i>Modules</button>
        <button type="button" class="editor-top-tab btn btn-sm btn-outline-light" data-view="static"><i class="fa-solid fa-image me-1" aria-hidden="true"></i>Static</button>
        <button type="button" class="editor-top-tab btn btn-sm btn-outline-light" data-view="data"><i class="fa-solid fa-database me-1" aria-hidden="true"></i>Data Sources</button>
      </nav>
      <div class="editor-top-actions d-none d-lg-flex">
        <button type="button" class="btn btn-sm btn-outline-light" id="btn-project-selector">Projects</button>
        <button type="button" class="btn btn-sm btn-outline-light" id="btn-full-yaml"><i class="fa-solid fa-code me-1" aria-hidden="true"></i>YAML</button>
        <button type="button" class="btn btn-sm btn-outline-light js-check-errors-btn" id="btn-check-errors" title="Check for errors"><i class="fa-solid fa-triangle-exclamation js-check-errors-icon d-none" aria-hidden="true"></i><span class="js-check-errors-label">Errors</span><span class="editor-validation-badge js-validation-badge d-none" data-validation-badge></span></button>
        <button type="button" class="btn btn-sm btn-outline-light" id="btn-standard-playground"><i class="fa-solid fa-flask me-1" aria-hidden="true"></i>Open playground</button>
        <button type="button" class="btn btn-sm btn-light" id="btn-preview-interview"><i class="fa-solid fa-play me-1" aria-hidden="true"></i>Run</button>
        <button type="button" class="btn btn-sm btn-outline-light" id="btn-save-file" disabled><i class="fa-solid fa-floppy-disk" aria-hidden="true"></i><span class="editor-save-badge js-save-badge d-none"></span></button>
      </div>
      <button type="button" class="btn btn-sm btn-outline-light d-lg-none ms-auto" id="topbar-hamburger" aria-label="Menu"><i class="fa-solid fa-bars" aria-hidden="true"></i></button>
    </div>
    <!-- Mobile dropdown menu -->
    <div class="editor-mobile-menu d-none" id="topbar-mobile-menu">
      <nav class="editor-mobile-tabs">
        <button type="button" class="editor-top-tab btn btn-sm btn-light active" data-view="interview"><i class="fa-solid fa-file-lines me-1" aria-hidden="true"></i>Interview</button>
        <button type="button" class="editor-top-tab btn btn-sm btn-outline-light" data-view="templates"><i class="fa-solid fa-file-word me-1" aria-hidden="true"></i>Templates</button>
        <button type="button" class="editor-top-tab btn btn-sm btn-outline-light" data-view="modules"><i class="fa-solid fa-cube me-1" aria-hidden="true"></i>Modules</button>
        <button type="button" class="editor-top-tab btn btn-sm btn-outline-light" data-view="static"><i class="fa-solid fa-image me-1" aria-hidden="true"></i>Static</button>
        <button type="button" class="editor-top-tab btn btn-sm btn-outline-light" data-view="data"><i class="fa-solid fa-database me-1" aria-hidden="true"></i>Data Sources</button>
      </nav>
      <div class="editor-mobile-actions">
        <button type="button" class="btn btn-sm btn-outline-light" id="btn-project-selector">Projects</button>
        <button type="button" class="btn btn-sm btn-outline-light" id="btn-full-yaml"><i class="fa-solid fa-code me-1" aria-hidden="true"></i>YAML</button>
        <button type="button" class="btn btn-sm btn-outline-light js-check-errors-btn" id="btn-check-errors"><i class="fa-solid fa-triangle-exclamation js-check-errors-icon d-none" aria-hidden="true"></i><span class="js-check-errors-label">Errors</span> <span class="editor-validation-badge js-validation-badge d-none" data-validation-badge></span></button>
        <button type="button" class="btn btn-sm btn-outline-light" id="btn-standard-playground"><i class="fa-solid fa-flask me-1" aria-hidden="true"></i>Open playground</button>
        <button type="button" class="btn btn-sm btn-light" id="btn-preview-interview"><i class="fa-solid fa-play me-1" aria-hidden="true"></i>Run</button>
      </div>
    </div>
  </header>

  <!-- ===== MAIN LAYOUT ===== -->
  <div class="editor-layout" id="editor-layout">

    <!-- LEFT RAIL -->
    <aside class="editor-left" id="left-rail">
      <div class="editor-section">
        <label class="editor-tiny" for="project-select">Project</label>
        <select class="form-select form-select-sm mt-1" id="project-select"></select>
      </div>
      <div class="editor-section" id="editor-file-section">
        <label class="editor-tiny" for="file-select">File</label>
        <div class="d-flex gap-2 align-items-center mt-1">
          <select class="form-select form-select-sm" id="file-select"></select>
          <div class="dropdown">
            <button type="button" class="editor-file-actions-kebab" data-bs-toggle="dropdown" data-bs-boundary="viewport" data-bs-display="dynamic" aria-expanded="false" title="File actions" aria-label="File actions"><i class="fa-solid fa-ellipsis-vertical" aria-hidden="true"></i></button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><button type="button" class="dropdown-item" id="btn-new-interview-file"><i class="fa-solid fa-plus me-2" aria-hidden="true"></i>New file</button></li>
              <li><button type="button" class="dropdown-item" id="btn-upload-interview-file"><i class="fa-solid fa-upload me-2" aria-hidden="true"></i>Upload file</button></li>
              <li><hr class="dropdown-divider"></li>
              <li><button type="button" class="dropdown-item" id="btn-rename-file"><i class="fa-solid fa-pen me-2" aria-hidden="true"></i>Rename file</button></li>
              <li><button type="button" class="dropdown-item" id="btn-download-file"><i class="fa-solid fa-download me-2" aria-hidden="true"></i>Download file</button></li>
              <li><hr class="dropdown-divider"></li>
              <li><button type="button" class="dropdown-item text-danger" id="btn-delete-file"><i class="fa-solid fa-trash-can me-2" aria-hidden="true"></i>Delete file</button></li>
            </ul>
            <input type="file" id="interview-upload-input" style="display:none" accept=".yml,.yaml">
          </div>
        </div>
      </div>
      <div class="editor-section editor-section-search" id="editor-quick-jump-section">
        <div class="editor-jump-list mb-2" id="jump-targets">
          <button type="button" class="editor-jump-item active" data-jump="questions">Questions</button>
          <button type="button" class="editor-jump-item" data-jump="all">All blocks</button>
          <button type="button" class="editor-jump-item" data-jump="code">Code</button>
          <button type="button" class="editor-jump-item" data-jump="objects">Objects</button>
          <button type="button" class="editor-jump-item" data-jump="attachments">Attachments</button>
          <div class="dropdown d-inline-block">
            <button type="button" class="editor-jump-item editor-jump-more-btn" data-bs-toggle="dropdown" data-bs-boundary="viewport" data-bs-display="dynamic" aria-expanded="false" title="More block types"><i class="fa-solid fa-ellipsis" aria-hidden="true"></i></button>
            <ul class="dropdown-menu editor-jump-more-menu">
              <li><button type="button" class="dropdown-item" data-jump="meta">Metadata &amp; config</button></li>
              <li><button type="button" class="dropdown-item" data-jump="templates">Templates</button></li>
              <li><button type="button" class="dropdown-item" data-jump="tables">Tables</button></li>
              <li><button type="button" class="dropdown-item" data-jump="events">Events</button></li>
              <li><button type="button" class="dropdown-item" data-jump="modules">Modules &amp; imports</button></li>
              <li><button type="button" class="dropdown-item" data-jump="sections">Sections</button></li>
              <li><hr class="dropdown-divider"></li>
              <li><button type="button" class="dropdown-item" data-jump="commented">Disabled blocks</button></li>
            </ul>
          </div>
        </div>
        <input class="form-control form-control-sm" id="search-input"
               placeholder="Type to filter&hellip;">
      </div>
      <div class="editor-outline-header d-flex align-items-center justify-content-between">
        <span class="editor-tiny">Block outline</span>
        <button type="button" class="btn btn-sm btn-outline-secondary editor-order-builder-btn" id="btn-order-builder" title="Interview order" aria-label="Interview order"><i class="fa-solid fa-list-ol" aria-hidden="true"></i><span>Order</span></button>
      </div>
      <div class="editor-outline-list" id="outline-list"></div>
    </aside>

    <!-- MAIN CANVAS -->
    <main class="editor-main" id="main-canvas">
      <div class="editor-canvas" id="canvas-content">
        <div class="text-center py-5 text-muted">
          <p>Select a project and file to begin editing.</p>
        </div>
      </div>
    </main>

  </div>

  <!-- Validation / Errors drawer -->
  <div class="editor-validation-drawer" id="validation-drawer">
    <div class="editor-validation-header">
      <button type="button" class="editor-validation-toggle" id="validation-toggle">
        <i class="fa-solid fa-triangle-exclamation me-1" aria-hidden="true"></i>
        <span id="validation-drawer-title">Errors &amp; Warnings</span>
        <span class="editor-validation-badge js-validation-badge d-none" data-validation-badge></span>
        <i class="fa-solid fa-chevron-up ms-auto editor-validation-chevron" aria-hidden="true"></i>
      </button>
      <div class="dropdown editor-validation-actions">
        <button type="button" class="editor-validation-menu-btn" data-bs-toggle="dropdown" data-bs-boundary="viewport" data-bs-display="dynamic" aria-expanded="false" aria-label="Validation actions" title="Validation actions"><i class="fa-solid fa-ellipsis-vertical" aria-hidden="true"></i></button>
        <ul class="dropdown-menu dropdown-menu-end editor-validation-menu">
          <li><button type="button" class="dropdown-item" id="btn-run-validation"><i class="fa-solid fa-triangle-exclamation me-2" aria-hidden="true"></i>Errors &amp; warnings</button></li>
          <li><button type="button" class="dropdown-item" id="btn-style-check"><i class="fa-solid fa-wand-magic-sparkles me-2" aria-hidden="true"></i>Style check</button></li>
        </ul>
      </div>
    </div>
    <div class="editor-validation-body" id="validation-drawer-body"></div>
  </div>
</div>

<!-- ===== MODALS ===== -->

<!-- Insert Block Modal -->
<div class="modal fade" id="insert-modal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Insert block</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="d-grid gap-2">
          <button type="button" class="btn btn-primary text-start" data-insert="question">New question screen</button>          <button type="button" class="btn btn-outline-secondary text-start" data-insert="ai-screen"><i class="fa-solid fa-wand-magic-sparkles me-1" aria-hidden="true"></i>AI draft screen</button>          <button type="button" class="btn btn-outline-secondary text-start" data-insert="code">New code block</button>
          <button type="button" class="btn btn-outline-secondary text-start" data-insert="objects">New objects block</button>
          <button type="button" class="btn btn-outline-secondary text-start" data-insert="attachment">New attachment block</button>
          <button type="button" class="btn btn-outline-secondary text-start" data-insert="other">New YAML block</button>
        </div>
        <div class="mt-3">
          <a href="https://docassemble.org/docs/initial.html" target="_blank" rel="noopener">Block type docs</a>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- Order Step Preview Modal -->
<div class="modal fade" id="order-preview-modal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <div class="editor-tiny" id="order-preview-label"></div>
          <h5 class="modal-title mt-1" id="order-preview-summary"></h5>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="order-preview-body"></div>
    </div>
  </div>
</div>

<!-- Order Step Edit Modal -->
<div class="modal fade" id="order-edit-modal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <div class="editor-tiny">Edit order step</div>
          <h5 class="modal-title mt-1" id="order-edit-title"></h5>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="order-edit-body"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-sm btn-primary" id="order-edit-save">Save step</button>
      </div>
    </div>
  </div>
</div>

<!-- Order Step Add Modal -->
<div class="modal fade" id="order-add-modal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <div class="editor-tiny">Add order step</div>
          <h5 class="modal-title mt-1">Choose type and details</h5>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="editor-tiny" for="order-add-kind">Step type</label>
          <select class="form-select form-select-sm mt-1" id="order-add-kind">
            <option value="screen">Screen</option>
            <option value="gather">List gather</option>
            <option value="condition">Condition</option>
            <option value="section">Start section</option>
            <option value="progress">Progress</option>
            <option value="function">Function</option>
            <option value="raw">Raw Python</option>
          </select>
        </div>
        <div id="order-add-body"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-sm btn-primary" id="order-add-save">Add step</button>
      </div>
    </div>
  </div>
</div>

<!-- Symbol Insert Modal (used for Mako insertion and label context menu) -->
<div class="modal fade" id="symbol-insert-modal" tabindex="-1">
  <div class="modal-dialog modal-sm modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <div class="editor-tiny">Insert</div>
          <h5 class="modal-title mt-1" id="symbol-insert-title">Name or Formatting</h5>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="editor-label-quick-actions mb-2">
          <button type="button" class="btn btn-sm btn-outline-secondary" data-label-insert="bold"><i class="fa-solid fa-bold"></i></button>
          <button type="button" class="btn btn-sm btn-outline-secondary" data-label-insert="italic"><i class="fa-solid fa-italic"></i></button>
          <button type="button" class="btn btn-sm btn-outline-secondary" data-label-insert="link"><i class="fa-solid fa-link"></i></button>
          <button type="button" class="btn btn-sm btn-outline-secondary" data-label-insert="mako"><i class="fa-solid fa-code"></i> Mako</button>
        </div>
        <div id="symbol-insert-search-wrap">
          <label class="editor-tiny" for="symbol-insert-search">Search available names</label>
          <input class="form-control form-control-sm mt-1" id="symbol-insert-search" placeholder="Type to filter names">
        </div>
        <div class="editor-tiny mt-2" id="symbol-insert-summary"></div>
        <div id="symbol-insert-list-wrap">
          <div class="editor-symbol-list mt-2" id="symbol-insert-list"></div>
        </div>
        <div id="symbol-insert-form-wrap" class="d-none">
          <div id="symbol-insert-form-body"></div>
        </div>
        <div class="editor-insert-doc-links mt-2">
          <a href="https://docassemble.org/docs/markup.html" target="_blank" rel="noopener noreferrer">Docassemble markup docs</a>
          <a href="https://docs.makotemplates.org/en/latest/syntax.html" target="_blank" rel="noopener noreferrer">Mako syntax docs</a>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-sm btn-primary d-none" id="symbol-insert-apply">Insert</button>
      </div>
    </div>
  </div>
</div>

<script src="/static/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/static/bootstrap-fileinput/js/plugins/sortable.min.js"></script>
<script>
  window.__EDITOR_BOOTSTRAP__ = __EDITOR_BOOTSTRAP_JSON__;
</script>
<script src="/al/editor/static/editor.js"></script>
</body>
</html>
