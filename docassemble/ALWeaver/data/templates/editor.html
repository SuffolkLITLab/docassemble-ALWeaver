<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Editor &mdash; Docassemble</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/1Vm4oh5R3LnDk5aBBT+1cOtThP4g9v"
      crossorigin="anonymous">
<link rel="stylesheet" href="/al/editor/static/styles.css">
<link rel="stylesheet" href="/al/editor/static/editor.css">
</head>
<body>
<div id="editor-app">

  <!-- ===== TOP BAR ===== -->
  <header class="editor-topbar" id="topbar">
    <div class="editor-topbar-inner">
      <div class="editor-brand">
        <span class="editor-brand-icon">&#9998;</span>
        <span>Interview Editor</span>
      </div>
      <nav class="editor-top-tabs" id="view-tabs">
        <button class="editor-top-tab active" data-view="interview">Interview</button>
        <button class="editor-top-tab" data-view="templates">Templates</button>
        <button class="editor-top-tab" data-view="modules">Modules</button>
        <button class="editor-top-tab" data-view="data">Data Sources</button>
      </nav>
      <div class="editor-top-actions">
        <button class="btn btn-sm btn-outline-light" id="btn-new-project">New project</button>
        <button class="btn btn-sm btn-outline-light" id="btn-full-yaml">Full YAML</button>
        <button class="btn btn-sm btn-outline-light" id="btn-order-builder">Order builder</button>
        <button class="btn btn-sm btn-light" id="btn-preview-interview">Preview</button>
      </div>
    </div>
  </header>

  <!-- ===== MAIN LAYOUT ===== -->
  <div class="editor-layout" id="editor-layout">

    <!-- LEFT RAIL -->
    <aside class="editor-left" id="left-rail">
      <div class="editor-section">
        <label class="editor-tiny" for="project-select">Project</label>
        <select class="form-select form-select-sm mt-1" id="project-select"></select>
      </div>
      <div class="editor-section">
        <label class="editor-tiny" for="file-select">File</label>
        <select class="form-select form-select-sm mt-1" id="file-select"></select>
      </div>
      <div class="editor-section editor-section-search">
        <input class="form-control form-control-sm mb-2" id="search-input"
               placeholder="Search blocks&hellip;">
        <div class="form-check form-switch editor-tiny" style="margin-bottom: 0;">
          <input class="form-check-input" type="checkbox" id="filter-questions-checkbox" checked>
          <label class="form-check-label" for="filter-questions-checkbox">Questions only</label>
        </div>
      </div>
      <div class="editor-section">
        <div class="editor-tiny">Quick jump</div>
        <div class="editor-jump-list" id="jump-targets">
          <button class="editor-jump-item active" data-jump="block">Blocks</button>
          <button class="editor-jump-item" data-jump="metadata">Metadata</button>
          <button class="editor-jump-item" data-jump="includes">Includes</button>
          <button class="editor-jump-item" data-jump="defaults">Defaults</button>
          <button class="editor-jump-item" data-jump="order">Order</button>
        </div>
      </div>
      <div class="editor-outline-header">
        <span class="editor-tiny">Outline</span>
      </div>
      <div class="editor-outline-list" id="outline-list"></div>
    </aside>

    <!-- MAIN CANVAS -->
    <main class="editor-main" id="main-canvas">
      <div class="editor-canvas" id="canvas-content">
        <div class="text-center py-5 text-muted">
          <p>Select a project and file to begin editing.</p>
        </div>
      </div>
    </main>

  </div>
</div>

<!-- ===== MODALS ===== -->

<!-- Insert Block Modal -->
<div class="modal fade" id="insert-modal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Insert block</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="d-grid gap-2">
          <button class="btn btn-primary text-start" data-insert="question">New question screen</button>
          <button class="btn btn-outline-secondary text-start" data-insert="code">New code block</button>
          <button class="btn btn-outline-secondary text-start" data-insert="objects">New objects block</button>
          <button class="btn btn-outline-secondary text-start" data-insert="other">New YAML block</button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- Order Step Preview Modal -->
<div class="modal fade" id="order-preview-modal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <div class="editor-tiny" id="order-preview-label"></div>
          <h5 class="modal-title mt-1" id="order-preview-summary"></h5>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="order-preview-body"></div>
    </div>
  </div>
</div>

<!-- Order Step Edit Modal -->
<div class="modal fade" id="order-edit-modal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <div class="editor-tiny">Edit order step</div>
          <h5 class="modal-title mt-1" id="order-edit-title"></h5>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="order-edit-body"></div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-sm btn-primary" id="order-edit-save">Save step</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.47.0/min/vs/loader.js"></script>
<script>
  window.__EDITOR_BOOTSTRAP__ = __EDITOR_BOOTSTRAP_JSON__;
</script>
<script src="/al/editor/static/editor.js"></script>
</body>
</html>
